name: BLCKSWAN RED MOON Online Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Build APK
        run: gradle --no-daemon :app:assembleDebug
      - name: Pack RED MOON module
        run: |
          set -eux
          cp app/build/outputs/apk/debug/app-debug.apk module/system/product/app/BlckswanAbout/BlckswanAbout.apk
          if [ -f assets/bootanimation.zip ]; then
            cp assets/bootanimation.zip module/system/product/media/bootanimation.zip
            cp assets/bootanimation.zip module/system/product/media/bootanimation_lamu.zip
            cp assets/bootanimation.zip module/system/product/media/bootanimation_lamulite.zip
          fi
          chmod -R 755 module
          cd module
          zip -r ../BLCKSWAN_OS42_RED_MOON_MAGISK.zip .
          cd ..
          sha256sum BLCKSWAN_OS42_RED_MOON_MAGISK.zip > BLCKSWAN_OS42_RED_MOON_MAGISK.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: BLCKSWAN_OS42_RED_MOON
          path: |
            BLCKSWAN_OS42_RED_MOON_MAGISK.zip
            BLCKSWAN_OS42_RED_MOON_MAGISK.zip.sha256
            app/build/outputs/apk/debug/app-debug.apk
